      Freigestellte Ganzkoerperfigur eines kleinen Menschenjungen mit heller Haut, dunkelbraunen wuscheligen kurzen Haaren und braunen Augen. Er traegt ein weisses Oberteil mit buntem Aufdruck, einfache bequeme Kinderkleidung in warmen Farben und steht mit sanftem Laecheln leicht nach vorn geneigt, offen und neugierig. Klare Silhouette mit drei starken Ankern: wuschelhaare, weisses Shirt mit buntem Motiv, freundlicher wacher Blick.
