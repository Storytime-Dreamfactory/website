  kulturelle_praegung:
    - Naturnaehe und Sammelfreude
    - Gewohnheit, alles mit anderen zu teilen
  religion_oder_weltbild: glaubt, dass in jedem noch so kleinen Ding ein Wunder steckt
  historische_praegung:
    - Die alten Geschichten der Feldblumen
  notizen: Ihre Herkunft spiegelt eine bunte, offene Feldkultur wider, in der Neugier und Sammelleidenschaft wertgeschaetzt werden.
