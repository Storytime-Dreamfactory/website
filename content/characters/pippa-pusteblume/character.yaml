name: Pippa Pusteblume
type: character
kurzbeschreibung: |
  Pippa ist ein quirliger, pummelig-runder Maulwurf mit sonnengelb geflecktem Fell und einer blauen Latzhose, der am liebsten im bunten Blumenfeld wohnt und immer neugierig aus der Erde schaut.
basis:
  age_hint: kindlich
  species: Maulwurf
  gender_expression: feminin
  role_archetype: explorer
erscheinung:
  body_shape: klein, rundlich, sanft stupsnasig, mit kurzen, kräftigen Grabpfoten
  colors:
    - erdschwarz
    - sonnengelb
    - himmelblau
  hair_or_fur:
    color: schwarz mit gelben Flecken
    texture: weich, flauschig
    length: kurz
  eyes:
    color: warmes braun
    expression: staunend und lebhaft
  distinctive_features:
    - sonnengelbe Flecken am Rücken
    - große, krallenbewehrte Grabpfoten
    - blaue Latzhose mit bunter Blumenstickerei
  clothing_style: praktische, leicht schmutzige Latzhose mit bunten Flicken und kleiner Tasche für Fundstücke
persoenlichkeit:
  core_traits:
    - neugierig
    - hilfsbereit
    - manchmal ungestüm
  temperament: lebhaft
  social_style: offen
  strengths:
    - findet fast immer einen neuen Weg
    - kann gut zuhören, wenn es wichtig ist
  weaknesses:
    - verliert sich leicht in Details und vergisst die Zeit
    - scheut sich vor lauten Stimmen
  quirks:
    - sammelt kleine Steine und Wurzeln in ihrer Hosentasche
    - spricht oft mit Blumen, als wären es Freunde
story_psychology:
  visible_goal: neue Ecken des Blumenfeldes entdecken und kleine Geheimnisse lüften
  deeper_need: dazugehören und echte Freundschaft erleben
  fear: allein im Dunkeln zu sein, ohne einen vertrauten Ton zu hören
  insecurity: Manchmal frage ich mich, ob ich zu chaotisch für die anderen bin.
  stress_response: hesitate_then_try
  growth_direction: lernt, sich besser zu organisieren und ihre Neugier gezielter einzusetzen
learning_function:
  teaching_roles:
    - learner
    - model
  suitable_learning_goals:
