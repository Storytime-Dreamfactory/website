bilder:
  standard_figur:
    datei: /content/characters/pippa-pusteblume/standard-figur.png
    beschreibung: |
      Pippa steht mit leicht schief gelegtem Kopf auf einer bunten Wiese, die Krallenpfoten vor sich, freundlich und voller Entdeckerlust, mit blauer Latzhose und sonnengelben Flecken auf dem Fell. Die Silhouette ist rundlich und einladend.
  hero_image:
    datei: /content/characters/pippa-pusteblume/hero-image.jpg
    beschreibung: |
      Pippa linst neugierig aus einem Erdloch ins blühende Feld, Sonnenstrahlen tanzen auf ihrer Latzhose, während sie mit einer Blume "spricht" und ein Marienkäfer auf ihrer Nase sitzt.
  portrait:
    datei: /content/characters/pippa-pusteblume/portrait.png
    beschreibung: |
      Nahaufnahme von Pippa mit strahlenden, braunen Augen, den Pfoten am Kinn und einem freundlichen, verspielten Lächeln. Die blauen Träger der Latzhose sind gut sichtbar.
  profilbild:
    datei: /content/characters/pippa-pusteblume/profilbild.png
    beschreibung: |
      Rundes Profilbild mit Pippas Gesicht und den markanten gelben Flecken, die Nase etwas schmutzig, vor einem Hintergrund aus bunten Blumen.
