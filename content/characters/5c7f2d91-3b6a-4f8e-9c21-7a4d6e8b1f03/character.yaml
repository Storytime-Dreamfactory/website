    - achtsamer Umgang mit Nacht, Wind und Waldgeraeuschen
  religion_oder_weltbild: Er glaubt, dass jede Kreatur ihren eigenen richtigen Zeitpunkt zum Sprechen hat
  historische_praegung:
    - aufgewachsen mit alten Waldpfaden und Geschichten ueber Nachtwachen im Geaest
  notizen: Elmar passt besonders gut in Wald-, Abend- und Zuhoer-Geschichten mit sanfter Spannung
