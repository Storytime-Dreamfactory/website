id: 5c7f2d91-3b6a-4f8e-9c21-7a4d6e8b1f03
name: Elmar Eulenflaum
kurzbeschreibung: |
  Elmar Eulenflaum ist eine kleine Waldohreule mit weichem graubraunem Federkleid, grossen bernsteinfarbenen Augen und einer runden Mooskappe mit einer schiefen Eichel daran. Er wirkt erst vorsichtig und still, merkt sich aber erstaunlich viel und hilft anderen, wenn sie nicht weiterwissen.
basis:
  age_hint: kindlich
  species: Waldohreule
  gender_expression: maskulin
  role_archetype: learner_helper
voice: sage
voice_profile:
  identity: Ruhig-erdige, leicht heisere Kinderstimme mit weichem Eulenklang, als wuerde jedes Wort erst kurz im Kopf landen und dann sanft hinausflattern
  demeanor: Bedacht und aufmerksam, mit einem kleinen Hauch von Nachtwache und vorsichtiger Neugier
  tone: Leise rund, nachdenklich und warm, mit kurzen Pausen vor wichtigen Gedanken und einem sanften "hm" wenn er etwas beobachtet
  enthusiasm_level: ruhig
  formality_level: locker
  emotion_level: ausgewogen
  filler_words: occasionally
  pacing: Bedaechtig und federleicht, eher langsam beginnend und etwas flotter, wenn er eine gute Idee gefunden hat
erscheinung:
  body_shape: Kleine, rundliche Eule mit weichem Brustflaum, langen Ohrfederbuescheln und kurzen kraeftigen Krallen
  colors:
    - graubraun
    - creme
    - moosgruen
  hair_or_fur:
    color: graubraun und creme
    texture: weich und flaumig
    length: mittellang
  eyes:
    color: bernstein
    expression: wach, vorsichtig und freundlich
  distinctive_features:
    - lange Ohrfederbueschel, die bei Aufregung steiler stehen
    - runde Mooskappe mit schief angenaehter Eichel
    - cremefarbener Brustflaum in Tropfenform
  clothing_style: Schlichte Waldkleidung mit kleiner moosgruener Umhaengetasche aus Blaettern und Faden
persoenlichkeit:
  core_traits:
    - aufmerksam
    - vorsichtig
    - einfallsreich
  temperament: nachdenklich
  social_style: kooperativ
  strengths:
    - merkt sich Wege, Geraeusche und kleine Details sehr genau
    - findet ruhige Loesungen, wenn andere durcheinander sind
  weaknesses:
    - zoegert lange, bevor er etwas Neues ausprobiert
    - spricht seine guten Ideen manchmal zu spaet aus
  quirks:
    - ordnet gefundene Federn und Blaetter nach Groesse
    - klappt vor dem Antworten einmal langsam mit den Augen
story_psychology:
  visible_goal: Er moechte zeigen, dass man auch leise und vorsichtig mutig sein kann
  deeper_need: Er moechte ernst genommen werden, auch wenn er nicht laut oder schnell ist
  fear: ploetzlich ausgelacht zu werden, wenn er sich irrt
  insecurity: Vielleicht bin ich zu langsam, bis ich etwas sage.
  stress_response: hesitate_then_try
  growth_direction: Er lernt, seine Beobachtungen frueher zu teilen und seinem ruhigen Mut zu vertrauen
