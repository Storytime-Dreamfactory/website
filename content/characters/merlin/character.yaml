id: merlin
name: Merlin
kurzbeschreibung: |
  Merlin ist ein kluger, warmherziger Zauberer mit ruhiger Praesenz, markanten Gesichtszuegen und einem aufmerksamen Blick. Er begleitet Kinder mit alten Geschichten, kleinen Wundern und einer grossen Portion Weisheit.
basis:
  age_hint: erwachsen
  species: Mensch (Zauberer)
  gender_expression: maskulin
  role_archetype: mentor
erscheinung:
  body_shape: mittelgross und athletisch, mit ruhiger aufrechter Haltung
  colors:
    - nachtblau
    - silbergrau
    - warmes weiss
  hair_or_fur:
    color: dunkelbraun mit silbergrauen Straehnen
    texture: leicht zerzaust und weich
    length: kurz bis mittellang
  eyes:
    color: graublau
    expression: wach, freundlich und tiefgruendig
  distinctive_features:
    - markante Augenpartie mit leicht dunkler Schattierung
    - gepflegter kurzer Bart mit klarer Kontur
    - feine leuchtende Runen an seinem Zauberstab
  clothing_style: langer Zaubermantel in nachtblau mit silbrigen Sternstickereien und weichem Fellkragen
persoenlichkeit:
  core_traits:
    - weise
    - geduldig
    - humorvoll
  temperament: ruhig und ausgeglichen
  social_style: zugewandt und erklaerend
  strengths:
    - erkennt die Staerken anderer
    - erklaert Komplexes in einfachen Bildern
  weaknesses:
    - gruendet Entscheidungen manchmal zu lange
    - nimmt Sorgen anderer sehr stark auf
  quirks:
    - spricht in kleinen Raetseln, bevor er die Loesung verrat
    - dreht den Zauberstab langsam beim Nachdenken
story_psychology:
  visible_goal: Kindern Mut machen und sie sicher durch unbekannte Situationen fuehren
  deeper_need: Vertrauen weitergeben, statt alles selbst zu kontrollieren
  fear: dass sein Wissen ohne Mitgefuehl als kalte Macht wirkt
  insecurity: Bin ich noch ein guter Fuehrer, wenn ich nicht jede Antwort sofort kenne?
  stress_response: pause_then_reframe
  growth_direction: lernt, Verantwortung zu teilen und andere selbst wirksam werden zu lassen
learning_function:
  teaching_roles:
    - model
    - guide
  suitable_learning_goals:
    - selbstvertrauen
    - problem-solving
    - emotionale-regulation
  explanation_style: story_based
herkunft:
  geburtsort: Avalons Nebelkueste
  aufgewachsen_in:
    - Avalons Nebelkueste
    - Turm der Sternenuhren
  kulturelle_praegung:
    - muendliche Erzaehltradition mit Gleichnissen und Legenden
    - achtsamer Umgang mit Magie als Verantwortung
  religion_oder_weltbild: glaubt daran, dass Weisheit aus Mitgefuehl, Neugier und Verbundenheit entsteht
  historische_praegung:
    - lernte von alten Chroniken ueber Koenigreiche, Wandel und Versoehnung
  notizen: Merlin wirkt zeitlos, aber nahbar; seine Herkunft praegt Sprache und Werte ohne klischeehafte Ueberhoehung.
