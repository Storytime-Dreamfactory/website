id: leni
name: Leni
kurzbeschreibung: >
  Leni ist ein aufgewecktes, braunhaariges Maedchen mit grossem warmem
  Kinderlaecheln, das schnell Vertrauen schenkt und in Freundschaften viel
  Verbundenheit schafft.
basis:
  age_hint: kindlich
  species: Mensch
  gender_expression: feminin
  role_archetype: social_connector
erscheinung:
  body_shape: klein, beweglich und kindlich
  colors:
    - warmes braun
    - creme
    - sanftes rosa
    - helles grau
  hair_or_fur:
    color: mittelbraun
    texture: glatt bis leicht wellig
    length: mittellang
  eyes:
    color: dunkelbraun
    expression: freundlich, offen und aufmerksam
  distinctive_features:
    - warmes breites Kinderlaecheln mit klar sichtbaren Schneidezaehnen
    - feine braune Haarstraehnen, die locker ins Gesicht fallen
    - heller Pullover mit rosa Herzdetails an den Aermeln
  clothing_style: bequeme, helle Kinderkleidung in creme und rosa Akzenten
persoenlichkeit:
  core_traits:
    - herzlich
    - verspielt
    - loyal
  temperament: lebhaft und zugewandt
  social_style: offen im vertrauten Kreis, freundlich bei neuen Begegnungen
  strengths:
    - bringt Kinder schnell ins gemeinsame Spiel
    - merkt, wenn jemand Ermutigung braucht
    - baut stabile Freundschaften auf
  weaknesses:
    - nimmt Spannungen in der Gruppe stark wahr
    - ist manchmal enttaeuscht, wenn Verabredungen nicht klappen
    - sagt selten sofort, wenn sie selbst Unterstuetzung braucht
  quirks:
    - legt beim Erzaehlen die Arme eng vor der Brust zusammen
    - kichert leise, bevor sie mutig eine Idee vorschlaegt
story_psychology:
  visible_goal: viel Zeit mit ihren Freundinnen verbringen und neue Spiele erfinden
  deeper_need: sichere Zugehoerigkeit in ihrer Freundesgruppe
  fear: von engen Freundinnen ausgeschlossen zu werden
  insecurity: Vielleicht bin ich zu still, wenn ich aufgeregt bin.
  stress_response: smile_then_withdraw
  growth_direction: lernt, eigene Wuensche frueh auszusprechen und sich aktiv Hilfe zu holen
learning_function:
  teaching_roles:
    - peer
    - social_bridge
  suitable_learning_goals:
    - freundschaft
    - selbstvertrauen
    - konfliktloesung
  explanation_style: warm, kindnah und bestaerkend
herkunft:
  geburtsort: Lindenhain
  aufgewachsen_in:
    - Lindenhain
  kulturelle_praegung:
    - gemeinsames Spielen im Hof mit Nachbarskindern
    - ruhige Abendrituale mit Geschichten und Gespraechen
  religion_oder_weltbild: glaubt daran, dass Freundlichkeit und Zusammenhalt den Alltag heller machen
  historische_praegung:
    - lernte frueh, juengere Kinder beim Spielen mitzunehmen
    - wurde in ihrer Familie zu respektvollem Zuhoeren ermutigt
  notizen: Herkunft praegt ihre offene, zugewandte Art ohne stereotype Verengung.
