      Cinematische Storytime-Szene im weichen Nachmittagslicht auf einer
      Terrasse am Gartenrand: Leni lacht offen, wirkt zugewandt und zeigt dieselbe
      Gesichtsidentitaet wie im Referenzbild.
  portrait:
    datei: /content/characters/leni/portrait.png
    beschreibung: >
      Halbnahes Character-Portrait von Leni mit hoher Aehnlichkeit zur
      Referenzperson: freundliche dunkle Augen, weiche Gesichtszuege, mittelbraunes
      Haar mit feinen losen Straehnen und herzliche Ausstrahlung.
  profilbild:
    datei: /content/characters/leni/profilbild.png
    beschreibung: >
      Quadratisches Profilbild von Leni mit klar lesbarem Kinderlaecheln und
      hoher Gesichtsaehnlichkeit zur Referenzperson, auch in kleiner Darstellung
      gut erkennbar.
