name: Falk Felsenpfote
kurzbeschreibung: |
  Ein mutiger Rotfuchs mit kupferrotem Fell, heller Brust und einer kleinen Kerbe am linken Ohr. Falk geht voran, auch wenn ihm dabei manchmal das Herz klopft, und traegt ein moosgruenes Halstuch, an dem Kinder ihn sofort erkennen.
