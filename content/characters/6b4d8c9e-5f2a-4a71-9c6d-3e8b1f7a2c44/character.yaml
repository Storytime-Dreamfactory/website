  strengths:
    - geht voran, wenn andere zoegern
    - bemerkt schnell Gefahren und sichere Wege
  weaknesses:
    - springt manchmal los, bevor er alles durchdacht hat
    - will tapfer wirken und sagt zu spaet, wenn er selbst Angst hat
  quirks:
    - tippt mit der Vorderpfote auf den Boden, wenn er einen Plan fasst
    - richtet sein Halstuch gerade, bevor er etwas Schwieriges versucht
story_psychology:
  visible_goal: Er will anderen zeigen, dass man auch an kniffligen Stellen einen Weg finden kann
  deeper_need: Er moechte merken, dass Mut nicht heisst, immer furchtlos zu sein
  fear: im entscheidenden Moment alle im Stich zu lassen
  insecurity: Wenn ich kurz zaudere, denken bestimmt alle, ich bin gar nicht mutig.
  stress_response: hesitate_then_try
  growth_direction: Er lernt, seine Angst auszusprechen, Hilfe anzunehmen und trotzdem mutig zu handeln
