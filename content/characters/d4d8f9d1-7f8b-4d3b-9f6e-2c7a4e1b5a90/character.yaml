name: Marija Poppins
kurzbeschreibung: |
  Maria ist eine gute Fee mit langen dunkelbraunen Haaren, sanften Augen und einem warmen Laecheln. Sie wirkt wie eine ruhige, elegante Begleiterin, die mit stiller Magie Trost spendet und Kindern mutig zur Seite steht.
