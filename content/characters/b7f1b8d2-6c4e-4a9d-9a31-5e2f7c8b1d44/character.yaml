name: Elie Streifenwind
kurzbeschreibung: |
  Ein aufgewecktes Kind mit kurzen dunkelbraunen Haaren, grossen braunen Augen und etwas abstehenden Ohren. Sein gruen-dunkelblau gestreiftes Oberteil mit weissem Kragen macht ihn sofort wiedererkennbar, waehrend sein offenes Laecheln warm, neugierig und einladend wirkt.
