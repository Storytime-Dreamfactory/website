    beschreibung: >
      Cinematische Storytime-Szene in warmem Nachmittagslicht auf einer
      Spielwiese: Carla ist mit Juna Lia, Yoko und Nola in Bewegung, lacht offen und
      zeigt dieselbe Gesichtsidentitaet wie im Referenzbild.
  portrait:
    datei: /content/characters/carla/portrait.png
    beschreibung: >
      Halbnahes Character-Portrait von Carla mit sehr hoher Aehnlichkeit zur
      Referenzperson: weiche Wangen, grosses ruhiges Augenpaar, hellblondes
      leicht gewelltes Haar, sanfte und freundliche Ausstrahlung.
  profilbild:
    datei: /content/characters/carla/profilbild.png
    beschreibung: >
      Quadratisches Profilbild von Carla mit klar lesbarer Mimik und hoher
