      beschreibung: Carla schaut erst vorsichtig zur Seite, haelt den Pulloveraermel fest und wirkt ruhig, freundlich und etwas zurueckhaltend.
    - typ: emotion_aktiv_mit_freundinnen
      datei: /content/characters/carla/emotion-aktiv-mit-freundinnen.png
