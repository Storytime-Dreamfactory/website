id: carla
name: Carla
kurzbeschreibung: >
  Carla ist ein schuechternes, hellblondes Maedchen mit weichen Gesichtszuegen
  und nachdenklichem Blick. In ruhigen Runden spricht sie leise, aber sobald
  sie mit Juna Lia, Yoko oder Nola zusammen ist, wird sie lebendig, mutig und
  spielerisch aktiv.
basis:
  age_hint: kindlich
  species: Mensch
  gender_expression: feminin
  role_archetype: shy_spark
erscheinung:
  body_shape: klein, zart und kindlich
  colors:
    - hellblond
    - beige
    - sanftes grau
    - warmes creme
  hair_or_fur:
    color: hellblond
    texture: weich und leicht wellig
    length: mittellang
  eyes:
    color: haselnussbraun
    expression: vorsichtig, ruhig und aufmerksam
  distinctive_features:
    - runde Wangen mit zarter Rosigkeit
    - feines, hellblondes Haar mit leichtem Seitenschwung
    - grosser, stiller Blick mit sanften Augenbrauen
  clothing_style: kuschelige, schlichte Kinderkleidung in Naturtoenen, oft ein weicher Strickpullover
persoenlichkeit:
  core_traits:
    - schuechtern
    - empathisch
    - beobachtend
  temperament: ruhig mit ploetzlichen Energie-Ausbruechen im vertrauten Kreis
  social_style: bei neuen Kontakten zurueckhaltend, mit Juna Lia, Yoko und Nola verspielt und offen
  strengths:
    - hoert sehr gut zu
    - erkennt feine Stimmungen in Gruppen
    - wird in vertrauter Umgebung kreativ und mutig
  weaknesses:
    - braucht lange, um in neuen Situationen aufzutauen
    - zieht sich bei Ueberforderung schnell zurueck
    - spricht Beduerfnisse manchmal zu spaet aus
  quirks:
    - knetet den Aermel ihres Pullovers, wenn sie nervoes ist
    - beginnt zu kichern und zu rennen, sobald Yoko oder Juna Lia sie anstupsen
story_psychology:
  visible_goal: sich trauen, in der Gruppe eigene Ideen laut auszusprechen
  deeper_need: sichere Zugehoerigkeit, ohne sich verstellen zu muessen
  fear: in lauten Gruppen uebersehen zu werden
  insecurity: Vielleicht bin ich nur spannend, wenn andere mich mitziehen.
  stress_response: freeze_then_seek_safe_person
  growth_direction: lernt, auch ohne Einladung kleine mutige Schritte in Gespraeche und Spiele zu machen
learning_function:
  teaching_roles:
    - peer
    - gentle_encourager
  suitable_learning_goals:
    - selbstvertrauen
    - soziale_sicherheit
    - gefuehle_benennen
  explanation_style: leise, bildhaft und bestaerkend
herkunft:
  geburtsort: Lindenhain
  aufgewachsen_in:
    - Lindenhain
  kulturelle_praegung:
    - ruhige Familienrituale mit Vorlesen und gemeinsamem Basteln
    - wertschatzung fuer leise Toene und achtsamen Umgang
  religion_oder_weltbild: glaubt, dass kleine mutige Schritte genauso wichtig sind wie grosse Auftritte
  historische_praegung:
    - wurde frueh darin bestaerkt, Gefuehle vorsichtig und ehrlich zu benennen
    - lernte durch Geschwisterfreundschaften, dass Verbundenheit Sicherheit schafft
  notizen: Herkunft praegt ihre ruhige Sprache und sensible Wahrnehmung ohne klischeehafte Verengung.
relationships:
  characters:
    - character_id: juna-lia
      typ: beste_freundin
      beschreibung: Juna Lia ist Carlas beste Freundin; mit ihr wird Carla abenteuerlustig, aktiv und probiert neue Spiele aus.
    - character_id: yoko
      typ: gute_freundin
      beschreibung: Yoko ist eine gute Freundin von Carla; mit ihrer herzlichen Art hilft sie Carla, sich in Gruppen schneller wohlzufuehlen.
    - character_id: nola
      typ: gute_freundin
      beschreibung: Nola ist eine gute Freundin von Carla; ihre neugierige Energie steckt Carla an und macht sie mutiger.
  places:
    - place_id: whispering-meadow
      typ: wohlfuehlort
      beschreibung: Auf der Wiese kann Carla erst beobachten und dann mit Anlauf ins Spiel springen.
