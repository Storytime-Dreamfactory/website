story_psychology:
  visible_goal: Er moechte der beste Kieselpfad-Bauer am Bachufer werden und zeigen, dass seine Ideen nuetzlich sind
  deeper_need: Er moechte spuern, dass man ihn auch mag, wenn nicht alles perfekt gelingt
  fear: Dass andere weiterziehen, weil er zu lange fuer etwas braucht
  insecurity: Wenn mein Stein wackelt, bin ich wohl doch nicht gut genug.
  stress_response: hesitate_then_try
  growth_direction: Er lernt, Frust auszuhalten, Hilfe anzunehmen und kleine Fortschritte stolz zu sehen
