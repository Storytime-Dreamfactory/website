name: Kuno Kieselkrabbe
kurzbeschreibung: |
  Kuno Kieselkrabbe ist eine kleine Bachuferkrabbe mit rundem Panzer in petrol und sandgoldenen Sprenkeln. Er traegt eine schiefe Schilfkappe und sammelt gern glatte Steine, wird aber ganz still, wenn etwas nicht sofort klappt.
