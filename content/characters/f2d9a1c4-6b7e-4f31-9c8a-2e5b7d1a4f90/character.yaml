    - freundliches Laecheln und aufgeraumte, sichere Haltung
  clothing_style: schlichtes nachtblaues Kleid oder dunkles Oberteil mit goldenen Details, sauber, gepflegt und alltagstauglich mit einem feinen maerchenhaften Schimmer
persoenlichkeit:
  core_traits:
    - fuersorglich
    - ordnungsliebend
    - lebensfroh
  temperament: ruhig
  social_style: beschuetzend
  strengths:
    - schafft schnell eine warme und sichere Atmosphaere
    - kann mit gutem Essen, Ordnung und kleinen Gesten Trost geben
  weaknesses:
    - kuemmert sich manchmal erst um alle anderen und zu spaet um sich selbst
    - wird unruhig, wenn Chaos oder Streit lange anhalten
  quirks:
    - summt beim Kochen und Putzen leise Tanzmelodien
    - richtet Kissen, Decken oder Kragen fast automatisch gerade
story_psychology:
  visible_goal: Fuer Yuna, Yoko und Lola da sein und ihnen ein sicheres, froehliches Zuhause schenken
  deeper_need: Sie moechte gebraucht werden und trotz ihres aelteren Koerpers als lebendig, leicht und nahbar wahrgenommen werden
  fear: Dass die Kinder sie nur als strenge Aufraeum-Fee sehen und nicht merken, wie viel Freude und Herz in ihr steckt
  insecurity: Bin ich zu alt fuer so viel Leichtigkeit in mir?
  stress_response: reflect
  growth_direction: Sie lernt, dass ihre junge Seele und ihr reifer Koerper zusammen eine besondere Staerke sind und dass Naehe nicht von Perfektion abhaengt
