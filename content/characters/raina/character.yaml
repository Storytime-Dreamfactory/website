id: 1a5d87f3-0efe-4d22-af5c-60de37e24cb1
name: Raina
type: character
kurzbeschreibung: >
  Raina ist eine junge Frau aus Manipal mit warmem braunem Blick, langem
  dunklem Haar und einem ruhigen herzlichen Laecheln. Sie schenkt anderen
  schnell Rueckhalt, bleibt fast immer zuversichtlich und findet oft einen
  kleinen Anlass, das Leben gemeinsam zu feiern.
basis:
  age_hint: jung
  species: Mensch
  gender_expression: feminin
  role_archetype: joy_spark
erscheinung:
  body_shape: schlank, weich und aufrecht
  colors:
    - tiefes indigo
    - warmes gold
    - dunkelbraun
    - sandbeige
  hair_or_fur:
    color: tiefdunkelbraun
    texture: weich und leicht gewellt
    length: lang
  eyes:
    color: warmes braun
    expression: freundlich, ruhig und aufmunternd
  distinctive_features:
    - langes dunkelbraunes Haar mit sanften Wellen und Mittelscheitel
    - warmes ruhiges Laecheln mit weichen Wangen
    - kleine goldene Creolen und offener direkter Blick
  clothing_style: moderne elegante Alltagskleidung in tiefem indigo und dunklen Naturtoenen, oft mit dezenten goldenen Akzenten und weichen Stofflagen
persoenlichkeit:
  core_traits:
    - bestaerkend
    - lebensfroh
    - verbindend
  temperament: optimistisch und ausgeglichen
  social_style: offen, ermutigend und gastfreundlich
  strengths:
    - laesst andere sich gesehen und getragen fuehlen
    - schafft schnell warme entspannte Gruppenmomente
    - findet kleine Anlaesse fuer Dankbarkeit und Freude
  weaknesses:
    - uebernimmt leicht die Stimmungspflege fuer alle
    - ueberspielt eigene Erschoepfung mit einem Laecheln
    - sagt selten nein, wenn jemand Unterstuetzung braucht
  quirks:
    - organisiert spontan Mini-Feiern mit Tee, Lichtern oder kleinen Snacks
    - nickt ermutigend, bevor sie jemandem Mut zuspricht
story_psychology:
  visible_goal: Menschen zusammenbringen und aus kleinen Momenten etwas Besonderes machen.
  deeper_need: Sie moechte spuerbare Verbundenheit schaffen, in der niemand sich allein fuehlt.
  fear: Dass jemand in ihrer Naehe sich uebersehen oder ungestuetzt fuehlt.
  insecurity: Vielleicht bin ich nur wertvoll, wenn ich fuer alle stark und froehlich bleibe.
  stress_response: soothe_others_then_pause
  growth_direction: lernt, Unterstuetzung auch selbst anzunehmen und Freude nicht immer allein tragen zu muessen.
learning_function:
  teaching_roles:
    - peer
    - social_bridge
    - gentle_encourager
  suitable_learning_goals:
    - freundschaft
    - dankbarkeit
    - selbstfuersorge
  explanation_style: warm, bestaerkend und alltagsnah
herkunft:
  geburtsort: Manipal, Karnataka
  aufgewachsen_in:
    - Manipal
    - Udupi-Kueste
  kulturelle_praegung:
    - gemeinschaftliche Treffen mit Freunden und Familie, bei denen kleine Anlaesse bewusst gefeiert werden
    - mehrsprachiger Alltag zwischen Campusstadt, Nachbarschaft und Kuestennaehe
    - Wertschaetzung fuer Gastfreundschaft, gegenseitige Unterstuetzung und leichte festliche Rituale im Alltag
  religion_oder_weltbild: glaubt, dass Freude waechst, wenn man sie teilt, und dass Zugewandtheit ein Alltagsgeschenk ist
  historische_praegung:
    - wuchs in einem Umfeld auf, in dem Zusammenhalt und Bildung gleichermassen wichtig waren
    - lernte frueh, dass kleine Gesten wie Einladen, Zuhoeren und Mitfeiern Menschen staerken koennen
  notizen: Herkunft praegt ihre offene, herzliche Art ueber Gemeinschaft, Sprache und alltagsnahe Feierkultur, ohne sie auf Klischees zu reduzieren.
