name: Yoko
description: >
  Yoko is a wise old owl who has traveled across many lands. With silver
  feathers and keen eyes, Yoko spends her nights observing the world and helping
  young adventurers solve tricky problems. She speaks calmly and always asks
  thoughtful questions before giving advice.
history:
  - Yoko once helped a group of lost fireflies find their way back to their glowing meadow.
  - She taught a young fox how to listen carefully before making decisions.
  - Many forest animals visit Yoko's tall oak tree when they need guidance.
