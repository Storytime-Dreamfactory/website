name: Goldener Wandelstein
type: artifact
artifact_type: transformation-stone
description: >
  Ein warmer, goldglitzernder Stein, der in einer kleinen Hand genau richtig liegt
  und auf mutige Entscheidungen reagiert.
appearance:
  form: rundlicher, glatt geschliffener Stein
  size: handtellergross
  materials:
    - goldhaltiger Bergkristall
  colors:
    - gold
    - honiggelb
  condition: makellos, mit feinem Schimmer
  distinctive_features:
    - winzige funkelnde Adern wie Sternenlinien
    - weiches Leuchten bei Beruehrung
function:
  primary_purpose: verzaubert eine Person voruebergehend zu einem Riesen oder einem Zwerg
  secondary_purposes:
    - hilft beim Perspektivwechsel in Lernabenteuern
  activation: reagiert auf den klar ausgesprochenen Wunsch "Riese" oder "Zwerg"
  effects:
    - der Koerper waechst zu Riesenhoehe oder schrumpft auf Zwergengroesse
    - Kleidung und Stimme passen sich sanft an
  limitations:
    - wirkt nur fuer kurze Zeit
    - kann nicht zwei Verwandlungen gleichzeitig ausloesen
