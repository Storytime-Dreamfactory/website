id: 313ab6c5-0d07-48d6-aae6-458a0218c020
name: Kindness
type: learning-goals
topic: Freundlichkeit im Alltag
description: >
  Helping children understand how small actions, like helping, sharing, or
  encouraging others, can make people feel happy and supported.
age_range:
  - 3-5
  - 6-8
example_questions:
  - What is one kind thing you can do for a friend?
  - How do people feel when someone is kind to them?
  - Can you remember a time someone was kind to you?
practice_ideas:
  - Notice one moment in the day when someone needs help.
  - Think of one friendly sentence you can say to cheer someone up.
  - Practice sharing something small with a sibling or friend.
domain_tags:
  - sozial
  - emotional
  - alltag
