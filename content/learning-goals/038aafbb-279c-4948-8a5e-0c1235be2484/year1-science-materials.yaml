name: Alltagsmaterialien
type: learning-goals
subject: naturwissenschaften
topic_group: Chemie und Materialien
topic: Alltagsmaterialien
subtopic: Materialien erkennen, ihre Eigenschaften beschreiben und vergleichen
description: >
  Die Schueler lernen, zwischen einem Gegenstand und dem Material zu
  unterscheiden, aus dem er besteht. Sie erkennen und benennen gaengige
  Alltagsmaterialien wie Holz, Kunststoff, Glas, Metall, Wasser und Stein,
  beschreiben deren einfache physikalische Eigenschaften und ordnen
  Materialien anhand dieser Eigenschaften in Gruppen ein.
