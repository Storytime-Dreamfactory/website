learning_objectives:
  - id: distinguish-object-material
    can_do: >
      Das Kind kann zwischen einem Gegenstand und dem Material unterscheiden,
      aus dem er hergestellt ist.
    original_en: >
      distinguish between an object and the material from which it is made
  - id: identify-everyday-materials
    can_do: >
      Das Kind kann verschiedene Alltagsmaterialien erkennen und benennen,
      darunter Holz, Kunststoff, Glas, Metall, Wasser und Stein.
    original_en: >
      identify and name a variety of everyday materials, including wood,
      plastic, glass, metal, water, and rock
  - id: describe-material-properties
    can_do: >
      Das Kind kann die einfachen physikalischen Eigenschaften verschiedener
      Alltagsmaterialien beschreiben.
    original_en: >
      describe the simple physical properties of a variety of everyday
      materials
  - id: group-materials-by-properties
    can_do: >
      Das Kind kann verschiedene Alltagsmaterialien anhand ihrer einfachen
      physikalischen Eigenschaften vergleichen und in Gruppen einteilen.
    original_en: >
      compare and group together a variety of everyday materials on the
      basis of their simple physical properties
