learning_objectives:
  - id: identify-common-plants
    can_do: >
      Das Kind kann verschiedene heimische Wild- und Gartenpflanzen erkennen
      und benennen, einschliesslich Laub- und Nadelbaeumen.
    original_en: >
      identify and name a variety of common wild and garden plants, including
      deciduous and evergreen trees
  - id: describe-plant-structure
    can_do: >
      Das Kind kann den grundlegenden Aufbau verschiedener gaengiger
      Bluetenpflanzen einschliesslich Baeumen erkennen und beschreiben.
    original_en: >
      identify and describe the basic structure of a variety of common
      flowering plants, including trees
