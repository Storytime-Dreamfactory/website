description: >
  Die Schueler lernen, verschiedene heimische Wild- und Gartenpflanzen zu
  erkennen und zu benennen, darunter Laub- und Nadelbaeume. Sie beschreiben
  den grundlegenden Aufbau gaengiger Bluetenpflanzen einschliesslich Baeumen.
