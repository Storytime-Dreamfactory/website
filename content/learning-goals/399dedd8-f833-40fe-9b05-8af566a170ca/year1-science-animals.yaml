id: 399dedd8-f833-40fe-9b05-8af566a170ca
name: Tiere und Menschen
type: learning-goals
subject: naturwissenschaften
topic_group: Biologie
topic: Tiere und Menschen
subtopic: Tierarten erkennen, vergleichen und den menschlichen Koerper kennenlernen
description: >
  Die Schueler lernen, verschiedene gaengige Tiere zu erkennen und zu benennen,
  darunter Fische, Amphibien, Reptilien, Voegel und Saeugetiere. Sie ordnen
  Tiere als Fleisch-, Pflanzen- oder Allesfresser ein, vergleichen den
  Koerperbau verschiedener Tiergruppen und benennen die wichtigsten Koerperteile
  des Menschen mit den zugehoerigen Sinnen.
age_range:
  - "5-6"
