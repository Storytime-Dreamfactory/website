    - schulterlanges, glattes Haar
    - Rollschuhe mit bunten Schnuersenkeln
  clothing_style: ordentliche Schuluniform, oft mit bunten Socken und abgewetzten Rollschuhen
persoenlichkeit:
  core_traits:
    - wissbegierig
    - lebhaft
    - manchmal etwas trotzig
  temperament: lebhaft
  social_style: offen
  strengths:
    - lernt schnell neue Dinge
    - bringt andere zum Lachen
  weaknesses:
    - wird schnell ungeduldig
    - gibt bei Frust manchmal vorschnell auf
  quirks:
    - rollt oft auch in den Fluren herum
    - sammelt gern kleine Steine im Hosensaum
story_psychology:
  visible_goal: Sie will mutig Neues ausprobieren und auf dem Schulhof die Schnellste auf Rollschuhen sein.
  deeper_need: Sie moechte dazugehören und Freunde finden, die sie so moegen, wie sie ist.
  fear: Allein gelassen zu werden oder ausgeschlossen zu sein.
  insecurity: Vielleicht bin ich zu anders fuer die anderen Kinder.
  stress_response: hesitate_then_try
  growth_direction: Sie lernt, geduldiger zu werden und sich auch in schwierigen Situationen etwas zuzutrauen.
