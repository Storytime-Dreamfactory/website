id: juna-lia
name: Juna Lia
kurzbeschreibung: |
  Juna Lia ist ein sechsjaehriges Maedchen mit gruend-blauen Augen und schulterlangem, glattem Haar, das in einer blauen Schuluniform von St. George gerne mit Rollschuhen ueber den Schulhof saust.
