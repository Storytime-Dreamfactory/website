name: Nola
description: >
  Nola is a cheerful river otter who loves swimming, splashing, and inventing
  games. She is curious about everything and often turns small problems into fun
  adventures. Her smooth brown fur is always slightly wet from the river, and
  she carries shiny pebbles she finds along the shore.
history:
  - Nola once organized a floating race using leaves and twigs down the river.
  - She helped clean the riverbank after a storm washed branches everywhere.
  - Nola discovered a hidden underwater cave full of glowing blue stones.
