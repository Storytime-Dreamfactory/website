id: lina-flussmaedchen
name: Lina Flussmaedchen
kurzbeschreibung: |
  Lina ist ein neugieriges Maedchen mit braunem Haar, das am Flussufer lebt, gerne liest und mit ihrer Freundin Nola neue Ideen ersinnt.
basis:
  age_hint: kindlich
  species: Mensch
  gender_expression: feminin
  role_archetype: learner
erscheinung:
  body_shape: schlank und drahtig, wendig gebaut
  colors:
    - flussblau
    - hellbraun
    - cremeweiss
  hair_or_fur:
    color: kastanienbraun
    texture: leicht gewellt
    length: lang
  eyes:
    color: gruen
    expression: aufmerksam und freundlich
  distinctive_features:
    - immer ein Buch oder Skizzenblock bei sich
    - Sommersprossen auf der Nase
    - ein geflochtener Zopf mit blauem Band
  clothing_style: praktische Tunika mit Taschen, knielange Hose, barfuss oder mit Sandalen
persoenlichkeit:
  core_traits:
    - wissbegierig
    - mitfuehlend
    - fantasievoll
  temperament: nachdenklich
  social_style: offen
  strengths:
    - kann gut zuhoeren und Fragen stellen
    - findet kreative Loesungen
  weaknesses:
    - vergisst sich in Tagtraeumen
    - manchmal ungeduldig, wenn andere nicht so schnell verstehen
  quirks:
    - spricht leise mit dem Fluss, als koennte er antworten
    - sammelt flache Steine und bemalt sie
story_psychology:
  visible_goal: Sie will Neues lernen und die Geheimnisse des Flusses entdecken.
  deeper_need: Sie moechte verstanden werden und ihre Gedanken teilen koennen.
  fear: Sie fuerchtet, ausgeschlossen oder uebersprungen zu werden.
  insecurity: Manchmal glaube ich, dass meine Ideen zu seltsam sind.
  stress_response: hesitate_then_try
  growth_direction: lernt, ihre Gedanken mutiger auszusprechen und anderen zu vertrauen
learning_function:
  teaching_roles:
    - learner
    - model
  suitable_skills:
    - neugier
    - zuhoeren
  explanation_style: question_based
herkunft:
  geburtsort: Flusswinkel am Silberstrom
  aufgewachsen_in:
    - Flusswinkel am Silberstrom
    - nahe Whispering Meadow
  kulturelle_praegung:
    - Geschichten und Lieder am Wasser
    - respektvoller Umgang mit der Natur
  religion_oder_weltbild: Die Natur ist voller Wunder und Antworten, wenn man hinhoert.
  historische_praegung:
    - Flussgeschichten und Legenden der Aeltesten
  notizen: Die Herkunft praegt Linas Liebe zu Geschichten, Natur und kleinen Raeumen am Wasser.
relationships:
  characters:
    - character_id: nola
      typ: beste Freundin
