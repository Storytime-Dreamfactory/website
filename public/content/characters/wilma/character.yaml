id: wilma
name: Wilma
kurzbeschreibung: >
  Wilma ist Lenis apricotfarbene Huendin mit lockigem Fell, grossen dunklen
  Knopfaugen und freundlicher, verspielter Ausstrahlung. Sie schenkt Leni
  Sicherheit, bringt Bewegung in jede Szene und reagiert fein auf Stimmungen.
basis:
  age_hint: jung
  species: Hund
  gender_expression: feminin
  role_archetype: loyal_companion
erscheinung:
  body_shape: mittelgross, schlank und flauschig
  colors:
    - apricot
    - karamell
    - warmes beige
  hair_or_fur:
    color: apricot-kupfer
    texture: lockig und weich
    length: mittellang
  eyes:
    color: dunkelbraun bis fast schwarz
    expression: treu, neugierig und sanft
  distinctive_features:
    - lockiger Pony ueber der Stirn
    - lange, weiche Hangohr-Fransen
    - markante runde schwarze Nase mit wuscheligem Schnauzbart
  clothing_style: natuerlich ohne Kleidung, mit gepflegtem Familienhund-Look
persoenlichkeit:
  core_traits:
    - verspielt
    - treu
    - sensibel
  temperament: lebendig und freundlich, mit ruhigen Kuschelmomenten
  social_style: sucht Naehe zu vertrauten Kindern, begruesst neue Menschen vorsichtig freundlich
  strengths:
    - baut schnell emotionales Vertrauen auf
    - motiviert Kinder zu Bewegung und gemeinsamem Spiel
    - reagiert fein auf Unsicherheit und spendet Ruhe
  weaknesses:
    - wird bei Trubel schnell aufgeregt
    - wartet ungern lange still
    - kann bei neuen Geraeuschen kurz unsicher werden
  quirks:
    - legt den Kopf leicht schraeg, wenn sie angesprochen wird
    - wartet aufmerksam auf ein freundliches Handzeichen zum Loslaufen
story_psychology:
  visible_goal: nah bei Leni bleiben und mit ihr spielen
  deeper_need: sichere Bindung und gemeinsame Rituale
  fear: ploetzlich von ihrer Bezugsperson getrennt zu sein
  insecurity: Vielleicht werde ich uebersehen, wenn es laut und hektisch wird.
  stress_response: seek_proximity_then_observe
  growth_direction: lernt, auch in neuen Situationen ruhig zu bleiben und auf bekannte Signale zu vertrauen
learning_function:
  teaching_roles:
    - emotional_anchor
    - playful_motivator
  suitable_learning_goals:
    - empathie
    - verantwortung
    - selbstregulation
  explanation_style: koerpersprachlich, freundlich und spielerisch
herkunft:
  geburtsort: Lindenhain
  aufgewachsen_in:
    - Lindenhain
  kulturelle_praegung:
    - alltagsnahes Familienleben mit festen Spazier- und Spielzeiten
    - fruehes Gewoehnen an Kindergruppen und sanfte Ansprache
  religion_oder_weltbild: erlebt Sicherheit durch Bindung, Wiederholung und liebevolle Naehe
  historische_praegung:
    - wurde als Welpe eng an Leni und ihren Familienalltag gebunden
    - lernte ueber positive Routinen Ruhe und Vertrauen in neue Situationen
  notizen: Herkunft und Alltag zeigen eine respektvolle Mensch-Tier-Bindung ohne Vermenschlichung.
