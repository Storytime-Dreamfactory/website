      ohne Menschen und ohne Teddibaer oder anderes Spielzeug.
  portrait:
    datei: /content/characters/wilma/portrait.png
    beschreibung: >
      Halbnahes Portrait von Wilma mit lockigem Stirnfell, dunklen treuen Augen
